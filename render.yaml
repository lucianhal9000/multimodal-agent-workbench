services:
  - type: web
    name: multimodal-agent-workbench
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: MAX_UPLOAD_MB
        value: "20"
      - key: MODEL_NAME
        value: llama-3.3-70b-versatile
      - key: TRANSCRIPTION_MODEL
        value: whisper-large-v3-turbo

